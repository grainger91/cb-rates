name: Daily central bank rates

on:
  schedule:
    # 11:00 UTC = 07:00 Toronto (summer / EDT). Use "0 12 * * *" in winter (EST).
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # lets the job commit the refreshed data file back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build data and send email if a rate changed
        run: python build.py
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT: ${{ secrets.RECIPIENT }}

      - name: Publish refreshed data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Update rates $(date -u +%F)"
          git push
